<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCT Table Tennis Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="setup-screen" class="screen active">
            <h1>VCT TT TOURNAMENT</h1>
            <div class="input-group">
                <label>Player A (アッパー側)</label>
                <input type="text" id="playerA-name" value="Player A">
            </div>
            <div class="input-group">
                <label>Player B (ロワー側)</label>
                <input type="text" id="playerB-name" value="Player B">
            </div>
            <button id="btn-start" class="btn-primary">START MATCH</button>
        </section>

        <section id="match-screen" class="screen">
            <div class="header-info">
                <h2>GAME <span id="game-count">1</span> / BO3</h2>
                <div id="ot-banner" class="hidden">OVERTIME (1ポイント交代)</div>
            </div>
            
            <div class="scoreboard">
                <div class="player-card" id="card-A">
                    <h3 id="display-name-A">Player A</h3>
                    <div class="score" id="score-A">0</div>
                    <div class="credits">🪙 <span id="credits-A">2</span> CREDITS</div>
                    <div class="equip-status">
                        <span id="equip-weapon-A">スリッパ</span> | 
                        <span id="equip-serve-A">制限サーブ</span>
                    </div>
                    <div class="op-status" id="op-A">OP所持 (+2点)</div>
                    <button class="btn-score" onclick="addPoint('A')">+ POINT (A)</button>
                </div>

                <div class="vs">VS</div>

                <div class="player-card" id="card-B">
                    <h3 id="display-name-B">Player B</h3>
                    <div class="score" id="score-B">0</div>
                    <div class="credits">🪙 <span id="credits-B">2</span> CREDITS</div>
                    <div class="equip-status">
                        <span id="equip-weapon-B">スリッパ</span> | 
                        <span id="equip-serve-B">制限サーブ</span>
                    </div>
                    <div class="op-status" id="op-B">OP所持 (+2点)</div>
                    <button class="btn-score" onclick="addPoint('B')">+ POINT (B)</button>
                </div>
            </div>
        </section>

        <section id="buy-screen" class="screen">
            <h2>BUY PHASE</h2>
            <p>ラウンド報酬が振り込まれました。</p>
            
            <div class="shop-container">
                <div class="shop-player">
                    <h3 id="shop-name-A">Player A</h3>
                    <p>所持金: 🪙 <span id="shop-credits-A"></span></p>
                    <select id="shop-weapon-A">
                        <option value="0">スリッパ (0)</option>
                        <option value="2">サブラケット (2)</option>
                        <option value="4">メインラケット (4)</option>
                    </select>
                    <label>
                        <input type="checkbox" id="shop-serve-A" value="2"> サーブ自由 (2)
                    </label>
                    <label class="op-label">
                        <input type="checkbox" id="shop-op-A" value="8"> オペレーター (8)
                    </label>
                </div>

                <div class="shop-player">
                    <h3 id="shop-name-B">Player B</h3>
                    <p>所持金: 🪙 <span id="shop-credits-B"></span></p>
                    <select id="shop-weapon-B">
                        <option value="0">スリッパ (0)</option>
                        <option value="2">サブラケット (2)</option>
                        <option value="4">メインラケット (4)</option>
                    </select>
                    <label>
                        <input type="checkbox" id="shop-serve-B" value="2"> サーブ自由 (2)
                    </label>
                    <label class="op-label">
                        <input type="checkbox" id="shop-op-B" value="8"> オペレーター (8)
                    </label>
                </div>
            </div>
            
            <button class="btn-primary" onclick="confirmBuy()">購入確定＆試合再開</button>
        </section>

        <section id="result-screen" class="screen">
            <h1 id="result-message">GAME WINNER</h1>
            <p>クレジットは次ゲームに引き継がれます（スノーボール）</p>
            <button class="btn-primary" onclick="nextGame()">次のゲームへ (0-0)</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
